<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage News</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 25px;
        }

        .top {
            margin-bottom: 25px;
        }

        button {
            padding: 10px 18px;
            cursor: pointer;
            margin-right: 10px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 12px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .display {
            width: auto;
            margin-right: 8px;
        }

        .delete-btn {
            margin-top: 15px;
            background: crimson;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h1>News Manager</h1>

<div class="top">
    <button onclick="addNews()">➕ Add News</button>
    <button onclick="save()">💾 Save Changes</button>
</div>

<div id="container">

{% for item in news %}

<div class="card">

<label>Date</label>
<input class="date" value="{{ item.date }}">

<label>Title</label>
<input class="title" value="{{ item.title }}">

<label>Summary</label>
<textarea class="summary">{{ item.summary }}</textarea>

<label>Tag</label>
<input class="tag" value="{{ item.tag }}">

<label>
    <input type="checkbox" class="display"
    {% if item.display %}checked{% endif %}>
    Display
</label>

<button class="delete-btn" onclick="this.parentElement.remove()">
Delete
</button>

</div>

{% endfor %}

</div>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>

<script>

function addNews(){

    const div=document.createElement("div");

    div.className="card";

    div.innerHTML=`
        <label>Date</label>
        <input class="date">

        <label>Title</label>
        <input class="title">

        <label>Summary</label>
        <textarea class="summary"></textarea>

        <label>Tag</label>
        <input class="tag">

        <label>
            <input type="checkbox" class="display" checked>
            Display
        </label>

        <button class="delete-btn" onclick="this.parentElement.remove()">
            Delete
        </button>
    `;

    document.getElementById("container").appendChild(div);
}

async function save(){

    const cards=document.querySelectorAll(".card");

    let news=[];

    cards.forEach(card=>{

        news.push({

            date:card.querySelector(".date").value.trim(),

            title:card.querySelector(".title").value.trim(),

            summary:card.querySelector(".summary").value.trim(),

            tag:card.querySelector(".tag").value.trim(),

            display:card.querySelector(".display").checked

        });

    });

    try{

        const r = await api("/admin/news/save", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(news)

        });

        const text = await r.text();

        console.log("Status:", r.status);
        console.log("Response:", text);

        if(r.ok){

            alert("✅ News updated successfully!");

        }else{

            alert(`❌ Failed (${r.status})\n\n${text}`);

        }

    }catch(err){

        console.error(err);
        alert("Request failed.");

    }

}

</script>

</body>
</html>
