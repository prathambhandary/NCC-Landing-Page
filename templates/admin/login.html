<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — {{ unit_name }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="signal-stripe" aria-hidden="true">
  <span class="s-gold"></span><span class="s-red"></span><span class="s-navy"></span><span class="s-sky"></span>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-icon" aria-hidden="true"><span class="crest-mini" aria-hidden="true"><img src="{{ url_for('static', filename='images/branding/ncclogo.png') }}" alt="NCC Logo"></span></div>
    <h1>Admin Access</h1>
    <p class="login-sub">{{ unit_name }}</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="current-password" autofocus required>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">
        <span id="loginBtnLabel">Log In</span>
        <span class="spinner" id="loginSpinner" aria-hidden="true"></span>
      </button>
    </form>

    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- login.html – keep as is, it already uses /api/login and redirects -->
<!-- But ensure the JavaScript does not store any token -->
<script>
const form = document.getElementById("loginForm");
const passwordInput = document.getElementById("password");
const errorBox = document.getElementById("loginError");
const loginBtn = document.getElementById("loginBtn");
const loginBtnLabel = document.getElementById("loginBtnLabel");
const loginSpinner = document.getElementById("loginSpinner");

function setLoading(isLoading) {
  loginBtn.disabled = isLoading;
  loginSpinner.classList.toggle("show", isLoading);
  loginBtnLabel.textContent = isLoading ? "Checking..." : "Log In";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.classList.remove("show");
  setLoading(true);

  try {
    const response = await fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify({ password: passwordInput.value }),
    });

    if (response.ok) {
      window.location.href = "/admin";
      return;
    }

    const data = await response.json().catch(() => ({}));
    errorBox.textContent = data.error || "Login failed. Please try again.";
    errorBox.classList.add("show");
    passwordInput.select();
  } catch (err) {
    errorBox.textContent = "Couldn't reach the server. Check your connection and try again.";
    errorBox.classList.add("show");
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
